# Select all PVCs using a StorageClass.
apiVersion: disk.autoscaler.io/v1alpha1
kind: DiskAutoscalePolicy
metadata:
  name: storageclass-policy
spec:
  storageClassName: managed-premium-v2

  scaleUp:
    enabled: true
    targetIOPSUtilizationPercent: 80
    targetThroughputUtilizationPercent: 80
    stepIOPS: 5000
    stepThroughputMBps: 100
    cooldown: 2m

  scaleDown:
    enabled: true
    targetIOPSUtilizationPercent: 30
    targetThroughputUtilizationPercent: 30
    stepIOPS: 2000
    stepThroughputMBps: 50
    cooldown: 10m

  constraints:
    minIOPS: 3000
    maxIOPS: 40000
    minThroughputMBps: 125
    maxThroughputMBps: 600

  behavior:
    initializationPeriod: 5m
    metricsWindow: 5m

  rateLimit:
    maxScalesPerHour: 6
---
# Select specific PVCs by label.
apiVersion: disk.autoscaler.io/v1alpha1
kind: DiskAutoscalePolicy
metadata:
  name: database-policy
spec:
  pvcSelector:
    matchLabels:
      app: postgresql
      disk-autoscaler: enabled

  scaleUp:
    enabled: true
    targetIOPSUtilizationPercent: 70
    targetThroughputUtilizationPercent: 70
    stepIOPS: 10000
    stepThroughputMBps: 200
    cooldown: 1m

  scaleDown:
    enabled: true
    targetIOPSUtilizationPercent: 20
    targetThroughputUtilizationPercent: 20
    stepIOPS: 3000
    stepThroughputMBps: 100
    cooldown: 15m

  constraints:
    minIOPS: 3000
    maxIOPS: 80000
    minThroughputMBps: 125
    maxThroughputMBps: 1200
